<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Duck | MUSICFRIENDLY</title>

    <meta property="og:title" content="Guitar Duck | MUSICFRIENDLY">
    <meta property="og:description" content="Marketing Manager - MUSICFRIENDLY. Click to save contact info.">
    <meta property="og:image" content="https://musicfriendly.github.io/namecards/MF_logo.png">
    <meta property="og:url" content="https://card.musicfriendly.com/guitar-duck.html">
    <meta property="og:type" content="website">

    <style>
        /* 基礎樣式重置 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #f0f2f5; /* 電腦版外框底色 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        /* 名片容器 */
        .card-container {
            background-color: #ffffff;
            width: 100%; 
            height: 100%; 
            max-width: 450px; /* 電腦版寬度限制 */
            margin: 0 auto;
            padding: 30px 25px;
            display: flex; 
            flex-direction: column;
            justify-content: space-between; /* 均勻分佈內容，防止捲動 */
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* 當螢幕夠大時，模擬手機殼造型 */
        @media (min-height: 750px) and (min-width: 500px) {
            .card-container {
                height: 780px;
                border-radius: 30px;
            }
        }

        /* 1. 公司 Logo (已加大) */
        .brand-header { 
            height: 90px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 5px;
        }
        .company-logo { 
            max-height: 100%; 
            max-width: 280px;
            width: auto;
            display: block;
        }
        
        /* 2. 個人照片 */
        .profile-img {
            width: 150px; 
            height: 150px; 
            border-radius: 50%;
            object-fit: cover; 
            margin: 0 auto;
            border: 3px solid #f8f8f8;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 3. 姓名職稱 */
        .name-title h1 { font-size: 30px; margin: 15px 0 5px; font-weight: 800; color: #1a1a1a; }
        .name-title p { font-size: 14px; color: #666; margin: 0; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }

        /* 4. 聯絡資訊 */
        .contact-info { font-size: 16px; line-height: 1.8; margin: 15px 0; }
        .contact-link { color: #000; text-decoration: none; display: block; padding: 4px 0; font-weight: 500; }
        
        .address-link { 
            color: #4285F4; 
            text-decoration: none; 
            font-size: 13px; 
            display: block; 
            margin-top: 8px; 
            line-height: 1.4;
        }

        /* 5. 底部按鈕 */
        .action-area { width: 100%; }
        .add-btn {
            background-color: #000000; 
            color: #ffffff;
            width: 100%; 
            padding: 18px 0; 
            border-radius: 40px;
            text-decoration: none; 
            font-size: 18px; 
            font-weight: bold;
            display: block; 
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .add-btn:active { transform: scale(0.96); opacity: 0.9; }
        
        .website-link { 
            display: inline-block; 
            margin-top: 15px; 
            font-size: 14px; 
            color: #999; 
            text-decoration: none; 
        }
    </style>
</head>
<body>

<div class="card-container">
    <div class="brand-header">
        <img src="MF_logo.png" class="company-logo" alt="MUSICFRIENDLY">
    </div>

    <img src="guitar-duck.png" class="profile-img" alt="Guitar Duck">

    <div class="name-title">
        <h1>Guitar Duck</h1>
        <p>Marketing Manager</p>
    </div>

    <div class="contact-info">
        <a href="tel:+85255785523" class="contact-link">T: +852 5578 5523</a>
        <a href="https://wa.me/85255785523" class="contact-link">WhatsApp: +852 5578 5523</a>
        <a href="mailto:enquiry@musicfriendly.com" class="contact-link">enquiry@musicfriendly.com</a>
        
        <a href="https://www.google.com/maps/search/?api=1&query=Ka+Ming+Court+688-690+Castle+Peak+Rd+Lai+Chi+Kok" target="_blank" class="address-link">
            📍 Flat D1, 4/F, Ka Ming Court Blocks C&D, <br>688-690 Castle Peak Rd, Lai Chi Kok
        </a>
    </div>

    <div class="action-area">
        <a href="Test%20only_20260406.vcf" class="add-btn">ADD TO CONTACTS</a>
        <a href="https://musicfriendly.com/" class="website-link">musicfriendly.com</a>
    </div>
</div>

</body>
</html>
