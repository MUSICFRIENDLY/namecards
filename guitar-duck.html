<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Duck | MUSICFRIENDLY</title>

    <meta property="og:title" content="Guitar Duck | MUSICFRIENDLY">
    <meta property="og:description" content="點擊查看名片，長按加微信好友">
    <meta property="og:image" content="https://musicfriendly.github.io/namecards/MF_logo.png">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #f0f2f5; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; }
        .card-container { background-color: #ffffff; width: 100%; height: 100%; max-width: 450px; margin: 0 auto; padding: 30px 25px; display: flex; flex-direction: column; justify-content: space-between; text-align: center; }
        @media (min-height: 750px) and (min-width: 500px) { .card-container { height: 780px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); } }
        .brand-header { height: 85px; display: flex; align-items: center; justify-content: center; }
        .company-logo { max-height: 100%; max-width: 280px; }
        .profile-img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin: 10px auto; border: 3px solid #f8f8f8; }
        .name-title h1 { font-size: 30px; margin: 10px 0 5px; color: #1a1a1a; }
        .contact-info { font-size: 16px; line-height: 1.8; margin: 15px 0; }
        .contact-link { color: #000; text-decoration: none; display: block; padding: 6px 0; font-weight: 500; }
        .wechat-btn { color: #07C160; font-weight: bold; cursor: pointer; border: 1px solid #07C160; border-radius: 10px; margin: 10px 0; padding: 10px; }
        .add-btn { background-color: #000; color: #fff; width: 100%; padding: 18px 0; border-radius: 40px; text-decoration: none; font-size: 18px; font-weight: bold; display: block; }
        
        /* 微信彈窗 */
        #wechat-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        #wechat-overlay img { width: 280px; height: 280px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div style="display:none;">
    <img src="https://musicfriendly.github.io/namecards/MF_logo.png" alt="share">
</div>

<div class="card-container">
    <div class="brand-header">
        <img src="MF_logo.png" class="company-logo" alt="MUSICFRIENDLY">
    </div>

    <img src="guitar-duck.png" class="profile-img" alt="Guitar Duck">

    <div class="name-title">
        <h1>Guitar Duck</h1>
        <p>Marketing Manager</p>
    </div>

    <div class="contact-info">
        <a href="tel:+85255785523" class="contact-link">電話: +852 5578 5523</a>
        <div class="wechat-btn" onclick="showWeChat()">加微信: aquaeel (點擊掃碼)</div>
        <a href="mailto:enquiry@musicfriendly.com" class="contact-link">郵箱: enquiry@musicfriendly.com</a>
    </div>

    <div class="action-area">
        <a href="GuitarDuck.vcf" class="add-btn" onclick="checkWechat(event)">存入通訊錄</a>
    </div>
</div>

<div id="wechat-overlay" onclick="hideWeChat()">
    <p>長按二維碼識別加好友</p>
    <a href="wechat-test.jpeg" target="_blank" onclick="event.stopPropagation();">
        <img src="wechat-test.jpeg" alt="QR">
    </a>
    <p>WeChat ID: aquaeel</p>
    <button onclick="copyID(event)" style="margin-top:10px; padding: 8px 15px; background:#07C160; color:#fff; border:none; border-radius:5px;">一鍵複製微信號</button>
</div>

<script>
    function showWeChat() { document.getElementById('wechat-overlay').style.display = 'flex'; }
    function hideWeChat() { document.getElementById('wechat-overlay').style.display = 'none'; }
    function copyID(e) { 
        e.stopPropagation(); 
        navigator.clipboard.writeText('aquaeel'); 
        alert('微信號已複製！'); 
    }
    function checkWechat(e) {
        if (navigator.userAgent.toLowerCase().indexOf('micromessenger') !== -1) {
            alert("請點擊右上角「...」選擇「在瀏覽器打開」即可下載。");
        }
    }
</script>

</body>
</html>
