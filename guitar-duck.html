<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Duck | MUSICFRIENDLY</title>

    <meta property="og:title" content="Guitar Duck | MUSICFRIENDLY">
    <meta property="og:description" content="Marketing Manager - MUSICFRIENDLY. Click to save contact info.">
    <meta property="og:image" content="https://musicfriendly.github.io/namecards/MF_logo.png">
    <meta property="og:url" content="https://card.musicfriendly.com/guitar-duck.html">
    <meta property="og:type" content="website">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 主容器：預設為手機直向 (Column) */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 100%;
            margin: 0 auto;
            overflow: hidden;
        }

        /* 左側/上方：Logo 區 */
        .brand-section {
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            flex: 0 0 120px; /* 手機版高度固定 */
        }
        .company-logo {
            max-width: 250px;
            width: 80%;
            height: auto;
        }

        /* 右側/下方：內容區 */
        .content-section {
            flex: 1;
            padding: 20px 30px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
        }

        .profile-img {
            width: 140px; height: 140px; border-radius: 50%;
            object-fit: cover; margin: 0 auto;
            border: 3px solid #f0f0f0;
        }

        .name-title h1 { font-size: 28px; margin: 15px 0 5px; font-weight: 800; color: #1a1a1a; }
        .name-title p { font-size: 14px; color: #666; margin: 0; letter-spacing: 1.5px; text-transform: uppercase; }

        .contact-info { font-size: 16px; line-height: 1.8; margin: 15px 0; }
        .contact-link { color: #000; text-decoration: none; display: block; padding: 5px 0; font-weight: 500; }
        .address-link { color: #4285F4; text-decoration: none; font-size: 13px; display: block; line-height: 1.4; margin-top: 5px; }

        .add-btn {
            background-color: #000000; color: #ffffff;
            width: 100%; padding: 18px 0; border-radius: 40px;
            text-decoration: none; font-size: 18px; font-weight: bold;
            display: block; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .website-link { display: inline-block; margin-top: 15px; font-size: 13px; color: #999; text-decoration: none; }

        /* 💻 電腦版橫向佈局 (螢幕寬度大於 768px 時觸發) */
        @media (min-width: 768px) {
            body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; }
            
            .main-wrapper {
                flex-direction: row; /* 變成左右並排 */
                max-width: 900px;
                height: 550px;
                border-radius: 20px;
                box-shadow: 0 20px 50px rgba(0,0,0,0.1);
                background-color: #fff;
            }

            .brand-section {
                flex: 1; /* 左邊佔一半 */
                background-color: #fafafa; /* 左側稍微加一點底色區分 */
                height: 100%;
                border-right: 1px solid #eee;
            }
            
            .company-logo {
                max-width: 350px; /* 電腦版 Logo 可以更大 */
            }

            .content-section {
                flex: 1; /* 右邊佔一半 */
                padding: 50px;
                justify-content: center; /* 電腦版內容垂直居中 */
            }
            
            .contact-info { margin: 30px 0; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="brand-section">
        <img src="MF_logo.png" class="company-logo" alt="MUSICFRIENDLY">
    </div>

    <div class="content-section">
        <div>
            <img src="guitar-duck.png" class="profile-img" alt="Guitar Duck">
            <div class="name-title">
                <h1>Guitar Duck</h1>
                <p>Marketing Manager</p>
            </div>
        </div>

        <div class="contact-info">
            <a href="tel:+85255785523" class="contact-link">T: +852 5578 5523</a>
            <a href="https://wa.me/85255785523" class="contact-link">WhatsApp: +852 5578 5523</a>
            <a href="mailto:enquiry@musicfriendly.com" class="contact-link">enquiry@musicfriendly.com</a>
            
            <a href="https://www.google.com/maps/search/?api=1&query=Ka+Ming+Court+Blocks+C%26D,+688-690+Castle+Peak+Rd,+Lai+Chi+Kok" target="_blank" class="address-link">
                📍 Flat D1, 4/F, Ka Ming Court Blocks C&D, <br>688-690 Castle Peak Rd, Lai Chi Kok
            </a>
        </div>

        <div class="action-area">
            <a href="Test%20only_20260406.vcf" class="add-btn">ADD TO CONTACTS</a>
            <a href="https://musicfriendly.com/" class="website-link">musicfriendly.com</a>
        </div>
    </div>
</div>

</body>
</html>
