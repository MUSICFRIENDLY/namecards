<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Duck | MUSICFRIENDLY</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        .card-container {
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-color: #ffffff;
            width: 100%; height: 100%; max-width: 450px;
            margin: 0 auto; padding: 30px 25px;
            display: flex; flex-direction: column; justify-content: space-between;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @media (min-height: 750px) and (min-width: 500px) {
            .card-container { height: 780px; border-radius: 30px; }
        }

        /* --- 頂部區域 --- */
        .brand-header { height: 80px; display: flex; align-items: center; justify-content: center; }
        .company-logo { max-height: 100%; max-width: 250px; width: auto; }
        .profile-img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin: 0 auto; border: 3px solid #f8f8f8; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* ========================================= */
        /* 🛠️ 間距調整專區 🛠️ */
        /* ========================================= */

        /* 1. 名字區塊位置：調整頂部 margin 讓名字上下移動 */
        .name-title { 
            margin-top: 15px;  /* 👈 改這裡：名字與照片的距離 */
            margin-bottom: 0px; 
        }

        /* 2. 聯絡資訊區塊位置：調整整個區塊的上下位置 */
        .contact-info { 
            margin-top: 20px;  /* 👈 改這裡：讓 Mobile/WhatsApp 整組上下移動 */
            margin-bottom: 10px; 
        }

        /* 3. 文字行距：調整這個數值來對齊條紋 */
        .contact-link { 
            padding: 5px 0;    /* 👈 改這裡：數值越大，每一行字分得越開 */
            color: #000; 
            text-decoration: none; 
            display: block; 
            font-weight: 500; 
            font-size: 16px;
        }

        /* ========================================= */

        .emp-id { font-size: 12px; color: #999; letter-spacing: 2px; font-weight: bold; }
        .name-title h1 { font-size: 30px; margin: 5px 0; font-weight: 800; color: #1a1a1a; }
        .name-title p { font-size: 14px; color: #666; margin: 0; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }
        
        .address-link { 
            color: #4285F4; 
            text-decoration: none; 
            font-size: 13px; 
            display: block; 
            margin-top: 10px; /* 👈 地址單獨的間距 */
            line-height: 1.4; 
        }

        .action-area { width: 100%; }
        .add-btn { background-color: #000; color: #fff; width: 100%; padding: 18px 0; border-radius: 40px; text-decoration: none; font-size: 18px; font-weight: bold; display: block; transition: 0.2s; }
        .website-link { display: inline-block; margin-top: 15px; font-size: 14px; color: #999; text-decoration: none; }
    </style>
</head>
<body>

<div class="card-container">
    <div class="brand-header">
        <img src="MF_logo.png" class="company-logo" alt="MUSICFRIENDLY">
    </div>

    <img src="guitar-duck.png" class="profile-img" alt="Guitar Duck">

    <div class="name-title">
        <div class="emp-id">MF-8888</div> 
        <h1>Guitar Duck</h1>
        <p>Marketing Manager</p>
    </div>

    <div class="contact-info">
        <a href="tel:+85255785523" class="contact-link">Mobile: +852 5578 5523</a>
        <a href="https://wa.me/85255785523" class="contact-link">WhatsApp: +852 5578 5523</a>
        <a href="mailto:enquiry@musicfriendly.com" class="contact-link">Email: enquiry@musicfriendly.com</a>
        <a href="https://maps.app.goo.gl/uX3L9GZ7pB6mYn8A7" target="_blank" class="address-link">
            📍 Flat D1, 4/F, Ka Ming Court Blocks C&D, <br>688-690 Castle Peak Rd, Lai Chi Kok
        </a>
    </div>

    <div class="action-area">
        <a href="Test%20only_20260406.vcf" class="add-btn">ADD TO CONTACTS</a>
        <a href="https://musicfriendly.com/" class="website-link">musicfriendly.com</a>
    </div>
</div>

</body>
</html>
