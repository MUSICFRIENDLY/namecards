<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Duck | MUSICFRIENDLY</title>

    <meta property="og:title" content="Guitar Duck | MUSICFRIENDLY">
    <meta property="og:description" content="MUSICFRIENDLY 市場經理 - 點擊查看聯絡資訊並加微信。">
    <meta property="og:image" content="https://musicfriendly.github.io/namecards/MF_logo.png">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        .card-container {
            background-color: #ffffff;
            width: 100%; height: 100%; max-width: 450px; 
            margin: 0 auto; padding: 30px 25px;
            display: flex; flex-direction: column; justify-content: space-between;
            text-align: center; position: relative;
        }

        @media (min-height: 750px) and (min-width: 500px) {
            .card-container { height: 780px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        }

        .brand-header { height: 80px; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }
        .company-logo { max-height: 100%; max-width: 250px; width: auto; }
        
        .profile-img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; margin: 0 auto; border: 3px solid #f8f8f8; }

        .name-title h1 { font-size: 28px; margin: 15px 0 5px; font-weight: 800; color: #1a1a1a; }
        .name-title p { font-size: 14px; color: #666; margin: 0; letter-spacing: 1px; }

        .contact-info { font-size: 16px; line-height: 2; margin: 15px 0; }
        .contact-link { color: #000; text-decoration: none; display: block; padding: 5px 0; font-weight: 500; }
        
        /* 微信按鈕特殊顏色 */
        .wechat-link { color: #07C160; font-weight: bold; cursor: pointer; }

        .action-area { width: 100%; }
        .add-btn {
            background-color: #000000; color: #ffffff;
            width: 100%; padding: 18px 0; border-radius: 40px;
            text-decoration: none; font-size: 18px; font-weight: bold;
            display: block; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* 微信彈窗 (Overlay) */
        #wechat-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center; color: #fff;
        }
        #wechat-overlay img { width: 260px; height: 260px; border-radius: 10px; margin-bottom: 20px; border: 5px solid #fff; }
        .close-hint { font-size: 14px; color: #bbb; margin-top: 20px; }

        .website-link { display: inline-block; margin-top: 15px; font-size: 13px; color: #999; text-decoration: none; }
    </style>
</head>
<body>

<div class="card-container">
    <div class="brand-header">
        <img src="MF_logo.png" class="company-logo" alt="MUSICFRIENDLY">
    </div>

    <img src="guitar-duck.png" class="profile-img" alt="Guitar Duck">

    <div class="name-title">
        <h1>Guitar Duck</h1>
        <p>市場經理 | Marketing Manager</p>
    </div>

    <div class="contact-info">
        <a href="tel:+85255785523" class="contact-link">電話: +852 5578 5523</a>
        <div class="contact-link wechat-link" onclick="showWeChat()">加微信好友 (點擊掃碼)</div>
        <a href="mailto:enquiry@musicfriendly.com" class="contact-link">郵箱: enquiry@musicfriendly.com</a>
        <div style="font-size: 13px; color: #888; margin-top: 10px;">
            地址: 荔枝角青山道688-690號嘉名大廈CD座4樓D1室
        </div>
    </div>

    <div class="action-area">
        <a href="Test_only_20260406.vcf" class="add-btn">存入通訊錄</a>
        <a href="https://musicfriendly.com/" class="website-link">musicfriendly.com</a>
    </div>
</div>

<div id="wechat-overlay" onclick="hideWeChat()">
    <p>請長按二維碼識別加好友</p>
    <img src="guitar-duck-wechat.png" alt="WeChat QR Code">
    <p>WeChat ID: 你的微信號</p>
    <div class="close-hint">點擊任意位置關閉</div>
</div>

<script>
    function showWeChat() { document.getElementById('wechat-overlay').style.display = 'flex'; }
    function hideWeChat() { document.getElementById('wechat-overlay').style.display = 'none'; }
</script>

</body>
</html>
