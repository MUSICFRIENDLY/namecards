<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Duck | MUSICFRIENDLY</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        .card-container {
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-color: #ffffff;
            width: 100%; height: 100%; max-width: 450px;
            margin: 0 auto; padding: 30px 25px;
            display: flex; flex-direction: column; justify-content: space-between;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @media (min-height: 750px) and (min-width: 500px) {
            .card-container { height: 780px; border-radius: 30px; }
        }

        .brand-header { height: 80px; display: flex; align-items: center; justify-content: center; }
        .company-logo { max-height: 100%; max-width: 250px; width: auto; }
        .profile-img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin: 0 auto; border: 3px solid #f8f8f8; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .name-title { margin-top: 15px; margin-bottom: 0px; }
        .emp-id { font-size: 12px; color: #999; letter-spacing: 2px; font-weight: bold; }
        .name-title h1 { font-size: 30px; margin: 5px 0; font-weight: 800; color: #1a1a1a; }
        .name-title p { font-size: 14px; color: #666; margin: 0; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }

        .info-qr-wrapper {
            display: flex;
            align-items: center;    /* 垂直居中對齊 */
            justify-content: space-between; /* 左右撐開 */
            margin-top: 20px;
            text-align: left;       /* 確保文字靠左 */
        }

        .contact-info { 
            flex: 1;               /* 佔據剩餘空間 */
        }

        .contact-link { 
            padding: 4px 0;
            color: #000; 
            text-decoration: none; 
            display: block; 
            font-weight: 500; 
            font-size: 15px;
        }

        .qr-side {
            margin-left: 15px;      /* 文字和 QR 碼之間的間距 */
        }

        .qr-img {
            width: 100px;           /* QR Code 大小 */
            height: 100px;
            border: 2px solid #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        /* ========================================= */

        .address-link { 
            color: #4285F4; 
            text-decoration: none; 
            font-size: 12px; 
            display: block; 
            margin-top: 10px;
            line-height: 1.4;
            text-align: left; /* 地址也靠左 */
        }

        .action-area { width: 100%; margin-top: 10px; }
        .add-btn { background-color: #000; color: #fff; width: 100%; padding: 18px 0; border-radius: 40px; text-decoration: none; font-size: 18px; font-weight: bold; display: block; transition: 0.2s; }
        .website-link { display: inline-block; margin-top: 15px; font-size: 14px; color: #999; text-decoration: none; }
    </style>
</head>
<body>

<div class="card-container">
    <div class="brand-header">
        <img src="MF_logo.png" class="company-logo" alt="MUSICFRIENDLY">
    </div>

    <img src="Ricky.jpg" class="profile-img" alt="Ricky Kwong">

    <div class="name-title">
        <div class="emp-id">MF-8888</div> 
        <h1>Ricky Kwong 鄺永祺</h1>
        <p>Director</p>
    </div>

    <div class="info-qr-wrapper">
        <div class="contact-info">
            <a href="tel:+85266555728" class="contact-link">Mobile: +852 6655 5728</a>
            <a href="https://wa.me/85266555728" class="contact-link">WhatsApp: +852 6655 5728</a>
            <a href="mailto:rickykwong@musicfriendly.com" class="contact-link">Email: rickykwong@musicfriendly.com</a>
        </div>
        
        <div class="qr-side">
            <img src="RickyKwong_QRcode.png" class="qr-img" alt="QR Code">
        </div>
    </div>

    <a href="https://maps.app.goo.gl/uX3L9GZ7pB6mYn8A7" target="_blank" class="address-link">
        📍 Flat D1, 4/F, Ka Ming Court Blocks C&D, <br>688-690 Castle Peak Rd, Lai Chi Kok
    </a>

    <div class="action-area">
        <a href="RickyKwong.vcf" class="add-btn">ADD TO CONTACTS</a>
        <a href="https://musicfriendly.com/" class="website-link">musicfriendly.com</a>
    </div>
</div>

</body>
</html>
